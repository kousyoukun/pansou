<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nova Search — 智能搜索引擎</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;300;400;500;600;700;800;900&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg-primary: #0a0a0f;
    --bg-secondary: #12121a;
    --bg-card: rgba(255,255,255,0.03);
    --bg-card-hover: rgba(255,255,255,0.06);
    --text-primary: #f0ece4;
    --text-secondary: #8a8690;
    --text-muted: #5a5660;
    --accent: #e8a849;
    --accent-glow: rgba(232,168,73,0.15);
    --accent-soft: rgba(232,168,73,0.08);
    --border: rgba(255,255,255,0.06);
    --border-focus: rgba(232,168,73,0.4);
    --radius: 16px;
    --radius-sm: 10px;
    --font-display: 'Outfit', sans-serif;
    --font-body: 'Noto Sans SC', 'Outfit', sans-serif;
  }

  html { font-size: 16px; scroll-behavior: smooth; }

  body {
    font-family: var(--font-body);
    background: var(--bg-primary);
    color: var(--text-primary);
    min-height: 100vh;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
  }

  /* ===== Background Atmosphere ===== */
  .bg-atmosphere {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
    overflow: hidden;
  }

  .bg-atmosphere .orb {
    position: absolute;
    border-radius: 50%;
    filter: blur(120px);
    opacity: 0.35;
    animation: orbFloat 20s ease-in-out infinite;
  }

  .bg-atmosphere .orb-1 {
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(232,168,73,0.2), transparent 70%);
    top: -200px; left: -100px;
    animation-delay: 0s;
  }

  .bg-atmosphere .orb-2 {
    width: 500px; height: 500px;
    background: radial-gradient(circle, rgba(120,80,200,0.15), transparent 70%);
    bottom: -150px; right: -100px;
    animation-delay: -7s;
    animation-duration: 25s;
  }

  .bg-atmosphere .orb-3 {
    width: 350px; height: 350px;
    background: radial-gradient(circle, rgba(73,180,232,0.1), transparent 70%);
    top: 40%; left: 60%;
    animation-delay: -14s;
    animation-duration: 30s;
  }

  .bg-grid {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
    background-image:
      linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
    background-size: 80px 80px;
    mask-image: radial-gradient(ellipse 60% 50% at 50% 30%, black, transparent);
  }

  @keyframes orbFloat {
    0%, 100% { transform: translate(0, 0) scale(1); }
    33% { transform: translate(40px, -30px) scale(1.05); }
    66% { transform: translate(-20px, 20px) scale(0.95); }
  }

  /* ===== Layout ===== */
  .app-container {
    position: relative;
    z-index: 1;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ===== Header / Nav ===== */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 40px;
    animation: fadeSlideDown 0.8s ease-out both;
  }

  @keyframes fadeSlideDown {
    from { opacity: 0; transform: translateY(-20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    text-decoration: none;
    color: var(--text-primary);
  }

  .logo-icon {
    width: 36px; height: 36px;
    background: linear-gradient(135deg, var(--accent), #d4883a);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--font-display);
    font-weight: 800;
    font-size: 18px;
    color: var(--bg-primary);
    box-shadow: 0 4px 20px rgba(232,168,73,0.25);
  }

  .logo-text {
    font-family: var(--font-display);
    font-weight: 700;
    font-size: 20px;
    letter-spacing: -0.5px;
  }

  .nav-links {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .nav-links a {
    color: var(--text-secondary);
    text-decoration: none;
    font-size: 14px;
    font-weight: 400;
    padding: 8px 16px;
    border-radius: var(--radius-sm);
    transition: all 0.25s ease;
  }

  .nav-links a:hover {
    color: var(--text-primary);
    background: var(--bg-card-hover);
  }

  .nav-links a.active {
    color: var(--accent);
    background: var(--accent-soft);
  }

  /* ===== Hero / Search Section ===== */
  .hero {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 20px 60px;
    transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .hero.compact {
    justify-content: flex-start;
    padding-top: 30px;
    flex: none;
  }

  .hero-title {
    font-family: var(--font-display);
    font-size: clamp(42px, 6vw, 72px);
    font-weight: 800;
    letter-spacing: -2px;
    text-align: center;
    margin-bottom: 12px;
    animation: fadeSlideUp 0.8s ease-out 0.15s both;
    line-height: 1.1;
  }

  .hero-title .highlight {
    background: linear-gradient(135deg, var(--accent), #f0c87a);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .hero-subtitle {
    font-size: 17px;
    color: var(--text-secondary);
    text-align: center;
    margin-bottom: 48px;
    font-weight: 300;
    animation: fadeSlideUp 0.8s ease-out 0.3s both;
    max-width: 500px;
    line-height: 1.6;
  }

  .hero.compact .hero-title { display: none; }
  .hero.compact .hero-subtitle { display: none; }

  @keyframes fadeSlideUp {
    from { opacity: 0; transform: translateY(24px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ===== Search Box ===== */
  .search-wrapper {
    width: 100%;
    max-width: 680px;
    animation: fadeSlideUp 0.8s ease-out 0.45s both;
    position: relative;
  }

  .search-box {
    position: relative;
    width: 100%;
    background: var(--bg-secondary);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    display: flex;
    align-items: center;
    padding: 6px 6px 6px 20px;
    transition: all 0.35s ease;
    box-shadow: 0 4px 30px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.03);
  }

  .search-box:focus-within {
    border-color: var(--border-focus);
    box-shadow: 0 4px 40px rgba(0,0,0,0.4), 0 0 0 4px var(--accent-glow), inset 0 1px 0 rgba(255,255,255,0.03);
    background: rgba(18,18,26,0.95);
  }

  .search-icon {
    flex-shrink: 0;
    width: 20px; height: 20px;
    color: var(--text-muted);
    transition: color 0.3s ease;
  }

  .search-box:focus-within .search-icon { color: var(--accent); }

  .search-input {
    flex: 1;
    background: none;
    border: none;
    outline: none;
    color: var(--text-primary);
    font-size: 16px;
    font-family: var(--font-body);
    padding: 14px 16px;
    font-weight: 400;
  }

  .search-input::placeholder { color: var(--text-muted); font-weight: 300; }

  .search-actions {
    display: flex;
    align-items: center;
    gap: 6px;
    flex-shrink: 0;
  }

  .search-btn {
    height: 42px;
    padding: 0 24px;
    border: none;
    border-radius: 12px;
    background: linear-gradient(135deg, var(--accent), #d4883a);
    color: var(--bg-primary);
    font-family: var(--font-display);
    font-weight: 600;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.25s ease;
    letter-spacing: 0.3px;
    box-shadow: 0 2px 12px rgba(232,168,73,0.2);
  }

  .search-btn:hover {
    transform: translateY(-1px);
    box-shadow: 0 4px 20px rgba(232,168,73,0.35);
  }

  .search-btn:active { transform: translateY(0); }

  .voice-btn {
    width: 42px; height: 42px;
    border: none;
    border-radius: 12px;
    background: var(--bg-card);
    color: var(--text-secondary);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.25s ease;
  }

  .voice-btn:hover {
    background: var(--bg-card-hover);
    color: var(--text-primary);
  }

  .voice-btn.listening {
    color: #e84949;
    background: rgba(232,73,73,0.1);
    animation: pulse 1.5s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(232,73,73,0.2); }
    50% { box-shadow: 0 0 0 8px rgba(232,73,73,0); }
  }

  /* ===== Suggestions Dropdown ===== */
  .suggestions {
    position: absolute;
    top: calc(100% + 8px);
    left: 0; right: 0;
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    z-index: 100;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    display: none;
    animation: suggestIn 0.2s ease-out;
  }

  .suggestions.visible { display: block; }

  @keyframes suggestIn {
    from { opacity: 0; transform: translateY(-8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .suggestion-item {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 12px 20px;
    cursor: pointer;
    transition: background 0.15s ease;
  }

  .suggestion-item:hover, .suggestion-item.selected {
    background: var(--bg-card-hover);
  }

  .suggestion-item .s-icon {
    width: 18px; height: 18px;
    color: var(--text-muted);
    flex-shrink: 0;
  }

  .suggestion-item .s-text {
    flex: 1;
    font-size: 14px;
    color: var(--text-primary);
  }

  .suggestion-item .s-text em {
    font-style: normal;
    color: var(--accent);
    font-weight: 500;
  }

  .suggestion-item .s-type {
    font-size: 11px;
    color: var(--text-muted);
    background: var(--bg-card);
    padding: 3px 8px;
    border-radius: 6px;
    flex-shrink: 0;
  }

  /* ===== Quick Tags ===== */
  .quick-tags {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 8px;
    margin-top: 28px;
    animation: fadeSlideUp 0.8s ease-out 0.6s both;
  }

  .hero.compact .quick-tags { display: none; }

  .tag {
    padding: 8px 18px;
    border-radius: 100px;
    border: 1px solid var(--border);
    background: var(--bg-card);
    color: var(--text-secondary);
    font-size: 13px;
    cursor: pointer;
    transition: all 0.25s ease;
    font-weight: 400;
    backdrop-filter: blur(8px);
  }

  .tag:hover {
    border-color: var(--border-focus);
    color: var(--accent);
    background: var(--accent-soft);
    transform: translateY(-1px);
  }

  /* ===== Search Results ===== */
  .results-section {
    max-width: 780px;
    width: 100%;
    margin: 0 auto;
    padding: 0 20px 80px;
    display: none;
  }

  .results-section.visible { display: block; }

  .results-meta {
    font-size: 13px;
    color: var(--text-muted);
    margin-bottom: 24px;
    padding-left: 4px;
  }

  .results-meta span { color: var(--accent); font-weight: 500; }

  .result-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px 28px;
    margin-bottom: 16px;
    transition: all 0.3s ease;
    cursor: pointer;
    animation: resultIn 0.5s ease-out both;
    position: relative;
    overflow: hidden;
  }

  .result-card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, var(--accent-soft), transparent 50%);
    opacity: 0;
    transition: opacity 0.3s ease;
  }

  .result-card:hover {
    border-color: var(--border-focus);
    transform: translateY(-2px);
    box-shadow: 0 8px 30px rgba(0,0,0,0.3);
  }

  .result-card:hover::before { opacity: 1; }

  .result-card > * { position: relative; z-index: 1; }

  @keyframes resultIn {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .result-card:nth-child(2) { animation-delay: 0.08s; }
  .result-card:nth-child(3) { animation-delay: 0.16s; }
  .result-card:nth-child(4) { animation-delay: 0.24s; }
  .result-card:nth-child(5) { animation-delay: 0.32s; }

  .result-source {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
  }

  .result-favicon {
    width: 20px; height: 20px;
    border-radius: 6px;
    background: var(--bg-card-hover);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    font-weight: 700;
    color: var(--accent);
    flex-shrink: 0;
  }

  .result-url {
    font-size: 13px;
    color: var(--text-muted);
  }

  .result-title {
    font-family: var(--font-display);
    font-size: 18px;
    font-weight: 600;
    color: var(--text-primary);
    margin-bottom: 8px;
    letter-spacing: -0.3px;
    line-height: 1.4;
    transition: color 0.2s ease;
  }

  .result-card:hover .result-title { color: var(--accent); }

  .result-desc {
    font-size: 14px;
    color: var(--text-secondary);
    line-height: 1.7;
    font-weight: 300;
  }

  .result-desc em {
    font-style: normal;
    color: var(--text-primary);
    font-weight: 500;
  }

  .result-tags {
    display: flex;
    gap: 6px;
    margin-top: 14px;
  }

  .result-tag {
    font-size: 11px;
    padding: 3px 10px;
    border-radius: 6px;
    background: var(--accent-soft);
    color: var(--accent);
    font-weight: 500;
  }

  /* ===== AI Summary ===== */
  .ai-summary {
    background: linear-gradient(135deg, rgba(232,168,73,0.06), rgba(120,80,200,0.04));
    border: 1px solid rgba(232,168,73,0.15);
    border-radius: var(--radius);
    padding: 24px 28px;
    margin-bottom: 24px;
    animation: resultIn 0.5s ease-out both;
  }

  .ai-summary-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 12px;
  }

  .ai-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    font-weight: 600;
    color: var(--accent);
    background: var(--accent-soft);
    padding: 4px 12px;
    border-radius: 100px;
    font-family: var(--font-display);
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }

  .ai-summary-text {
    font-size: 14px;
    color: var(--text-secondary);
    line-height: 1.8;
    font-weight: 300;
  }

  .ai-summary-text strong { color: var(--text-primary); font-weight: 500; }

  /* ===== Footer ===== */
  footer {
    text-align: center;
    padding: 24px;
    font-size: 13px;
    color: var(--text-muted);
    border-top: 1px solid var(--border);
    animation: fadeSlideUp 0.8s ease-out 0.75s both;
  }

  footer a { color: var(--text-secondary); text-decoration: none; }
  footer a:hover { color: var(--accent); }

  /* ===== Loading Animation ===== */
  .loading-bar {
    position: fixed;
    top: 0; left: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    z-index: 1000;
    width: 0;
    opacity: 0;
    transition: opacity 0.3s ease;
  }

  .loading-bar.active {
    opacity: 1;
    animation: loadProgress 1.2s ease-out forwards;
  }

  @keyframes loadProgress {
    0% { width: 0; }
    60% { width: 75%; }
    100% { width: 100%; }
  }

  /* ===== Responsive ===== */
  @media (max-width: 640px) {
    header { padding: 16px 20px; }
    .nav-links a { padding: 6px 12px; font-size: 13px; }
    .hero { padding: 30px 16px 40px; }
    .search-box { padding: 4px 4px 4px 16px; }
    .search-input { font-size: 15px; padding: 12px 12px; }
    .search-btn { padding: 0 16px; font-size: 13px; }
    .result-card { padding: 20px; }
    .quick-tags { gap: 6px; }
    .tag { padding: 6px 14px; font-size: 12px; }
  }

  /* ===== Noise Overlay ===== */
  .noise {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
    opacity: 0.025;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-repeat: repeat;
    background-size: 256px 256px;
  }

  /* ===== Scrollbar ===== */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.15); }

  /* ===== Selection ===== */
  ::selection { background: rgba(232,168,73,0.25); color: var(--text-primary); }
</style>
</head>
<body>

<div class="bg-atmosphere">
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
</div>
<div class="bg-grid"></div>
<div class="noise"></div>
<div class="loading-bar" id="loadingBar"></div>

<div class="app-container">
  <header>
    <a href="#" class="logo" onclick="resetSearch(event)">
      <div class="logo-icon">N</div>
      <span class="logo-text">Nova</span>
    </a>
    <nav class="nav-links">
      <a href="#" class="active">搜索</a>
      <a href="#">图片</a>
      <a href="#">视频</a>
      <a href="#">新闻</a>
    </nav>
  </header>

  <section class="hero" id="hero">
    <h1 class="hero-title">探索世界的<span class="highlight">智能起点</span></h1>
    <p class="hero-subtitle">由 AI 驱动的新一代搜索引擎，为你提供精准、深度的搜索体验</p>

    <div class="search-wrapper">
      <div class="search-box" id="searchBox">
        <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/>
        </svg>
        <input class="search-input" id="searchInput" type="text" placeholder="搜索任何内容..." autocomplete="off" autofocus>
        <div class="search-actions">
          <button class="voice-btn" id="voiceBtn" title="语音搜索">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" x2="12" y1="19" y2="22"/>
            </svg>
          </button>
          <button class="search-btn" id="searchBtn">搜索</button>
        </div>
      </div>
      <div class="suggestions" id="suggestions"></div>
    </div>

    <div class="quick-tags">
      <span class="tag" onclick="quickSearch('人工智能发展趋势')">🤖 人工智能趋势</span>
      <span class="tag" onclick="quickSearch('量子计算最新进展')">⚛️ 量子计算</span>
      <span class="tag" onclick="quickSearch('太空探索 2026')">🚀 太空探索</span>
      <span class="tag" onclick="quickSearch('全球气候变化数据')">🌍 气候变化</span>
      <span class="tag" onclick="quickSearch('深度学习框架对比')">💻 深度学习</span>
    </div>
  </section>

  <section class="results-section" id="resultsSection">
    <div class="ai-summary" id="aiSummary" style="display:none">
      <div class="ai-summary-header">
        <span class="ai-badge">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2 2 7l10 5 10-5-10-5Z"/><path d="m2 17 10 5 10-5"/><path d="m2 12 10 5 10-5"/></svg>
          AI 摘要
        </span>
      </div>
      <div class="ai-summary-text" id="aiSummaryText"></div>
    </div>
    <div class="results-meta" id="resultsMeta"></div>
    <div id="resultsContainer"></div>
  </section>

  <footer>
    <p>Nova Search &copy; 2026 &nbsp;·&nbsp; <a href="#">隐私政策</a> &nbsp;·&nbsp; <a href="#">使用条款</a> &nbsp;·&nbsp; <a href="#">关于</a></p>
  </footer>
</div>

<script>
  // ===== Mock Data =====
  const searchDatabase = {
    '人工智能发展趋势': {

  const suggestionPool = [
    { text: '人工智能发展趋势', type: '热门' },
    { text: '人工智能应用案例', type: '推荐' },
    { text: '人工智能伦理问题', type: '话题' },
    { text: '量子计算最新进展', type: '热门' },
    { text: '量子计算入门教程', type: '推荐' },
    { text: '量子计算 vs 经典计算', type: '对比' },
    { text: '太空探索 2026', type: '热门' },
    { text: '太空探索纪录片推荐', type: '推荐' },
    { text: '全球气候变化数据', type: '热门' },
    { text: '气候变化应对措施', type: '话题' },
    { text: '深度学习框架对比', type: '热门' },
    { text: '深度学习入门指南', type: '推荐' },
    { text: '如何学习机器学习', type: '教程' },
    { text: 'Python 数据分析', type: '教程' },
    { text: '2026 科技趋势', type: '热门' },
    { text: 'Web 开发最佳实践', type: '教程' },
  ];

  // ===== DOM Elements =====
  const searchInput = document.getElementById('searchInput');
  const searchBtn = document.getElementById('searchBtn');
  const voiceBtn = document.getElementById('voiceBtn');
  const suggestionsEl = document.getElementById('suggestions');
  const heroEl = document.getElementById('hero');
  const resultsSection = document.getElementById('resultsSection');
  const resultsContainer = document.getElementById('resultsContainer');
  const resultsMeta = document.getElementById('resultsMeta');
  const aiSummary = document.getElementById('aiSummary');
  const aiSummaryText = document.getElementById('aiSummaryText');
  const loadingBar = document.getElementById('loadingBar');

  let selectedSuggestion = -1;
  let currentSuggestions = [];

  // ===== Search Logic =====
  function performSearch(query) {
    if (!query.trim()) return;

    query = query.trim();
    searchInput.value = query;
    hideSuggestions();

    // Show loading
    loadingBar.classList.add('active');
    setTimeout(() => loadingBar.classList.remove('active'), 1300);

    // Compact hero
    heroEl.classList.add('compact');

    // Show results after delay
    setTimeout(() => {
      const data = searchDatabase[query];

      if (data) {
        // AI Summary
        aiSummary.style.display = 'block';
        aiSummaryText.innerHTML = data.aiSummary;

        // Results
        resultsMeta.innerHTML = `找到约 <span>${data.results.length * 1247 + Math.floor(Math.random() * 500)}</span> 条结果（${(Math.random() * 0.3 + 0.15).toFixed(2)} 秒）`;
        resultsContainer.innerHTML = data.results.map((r, i) => `
          <div class="result-card" style="animation-delay:${i * 0.08}s">
            <div class="result-source">
              <div class="result-favicon">${r.url.charAt(0).toUpperCase()}</div>
              <span class="result-url">${r.url}</span>
            </div>
            <div class="result-title">${highlightMatch(r.title, query)}</div>
            <div class="result-desc">${highlightMatch(r.desc, query)}</div>
            <div class="result-tags">${r.tags.map(t => `<span class="result-tag">${t}</span>`).join('')}</div>
          </div>
        `).join('');
      } else {
        // Generic results for unknown queries
        aiSummary.style.display = 'block';
        aiSummaryText.innerHTML = `关于「<strong>${escapeHtml(query)}</strong>」的搜索结果如下。Nova Search 正在为你整理最相关的信息，帮助你快速获取所需内容。`;

        const fakeResults = generateFakeResults(query);
        resultsMeta.innerHTML = `找到约 <span>${(Math.floor(Math.random() * 900) + 100).toLocaleString()}</span> 条结果（${(Math.random() * 0.3 + 0.12).toFixed(2)} 秒）`;
        resultsContainer.innerHTML = fakeResults.map((r, i) => `
          <div class="result-card" style="animation-delay:${i * 0.08}s">
            <div class="result-source">
              <div class="result-favicon">${r.url.charAt(0).toUpperCase()}</div>
              <span class="result-url">${r.url}</span>
            </div>
            <div class="result-title">${r.title}</div>
            <div class="result-desc">${r.desc}</div>
            <div class="result-tags">${r.tags.map(t => `<span class="result-tag">${t}</span>`).join('')}</div>
          </div>
        `).join('');
      }

      resultsSection.classList.add('visible');
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }, 800);
  }

  function generateFakeResults(query) {
    const domains = ['wikipedia.example', 'techblog.example', 'research.example', 'news.example', 'learn.example'];
    return [
      { url: `${domains[0]}/wiki/${encodeURIComponent(query)}`, title: `${query} — 维基百科`, desc: `${query}是一个广泛讨论的话题。本文将从多个角度全面介绍${query}的定义、历史、发展现状和未来趋势...`, tags: ['百科', '综合'] },
      { url: `${domains[1]}/${encodeURIComponent(query)}-guide`, title: `深入了解${query}：完整指南与最佳实践`, desc: `本指南涵盖了${query}的核心概念、实际应用和进阶技巧，适合不同层次的读者参考学习...`, tags: ['指南', '教程'] },
      { url: `${domains[2]}/papers/${encodeURIComponent(query)}`, title: `${query}相关最新研究论文汇总`, desc: `精选了2025-2026年间关于${query}的高影响力学术论文，涵盖理论研究和实践应用两个方面...`, tags: ['研究', '论文'] },
      { url: `${domains[3]}/${encodeURIComponent(query)}-news`, title: `${query}最新资讯与行业动态`, desc: `追踪${query}领域的最新发展，包括技术突破、市场变化和政策更新等重要信息...`, tags: ['新闻', '动态'] },
    ];
  }

  function highlightMatch(text, query) {
    if (!query) return text;
    const escaped = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    return text.replace(new RegExp(`(${escaped})`, 'gi'), '<em>$1</em>');
  }

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  function resetSearch(e) {
    if (e) e.preventDefault();
    searchInput.value = '';
    heroEl.classList.remove('compact');
    resultsSection.classList.remove('visible');
    aiSummary.style.display = 'none';
    searchInput.focus();
  }

  function quickSearch(query) {
    searchInput.value = query;
    performSearch(query);
  }

  // ===== Suggestions =====
  function showSuggestions(query) {
    if (!query.trim()) {
      hideSuggestions();
      return;
    }

    currentSuggestions = suggestionPool.filter(s =>
      s.text.toLowerCase().includes(query.toLowerCase())
    ).slice(0, 6);

    if (currentSuggestions.length === 0) {
      hideSuggestions();
      return;
    }

    selectedSuggestion = -1;

    suggestionsEl.innerHTML = currentSuggestions.map((s, i) => {
      const highlighted = s.text.replace(
        new RegExp(`(${query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi'),
        '<em>$1</em>'
      );
      return `
        <div class="suggestion-item" data-index="${i}" onmouseenter="selectSuggestion(${i})" onclick="pickSuggestion(${i})">
          <svg class="s-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/>
          </svg>
          <span class="s-text">${highlighted}</span>
          <span class="s-type">${s.type}</span>
        </div>
      `;
    }).join('');

    suggestionsEl.classList.add('visible');
  }

  function hideSuggestions() {
    suggestionsEl.classList.remove('visible');
    selectedSuggestion = -1;
    currentSuggestions = [];
  }

  function selectSuggestion(index) {
    const items = suggestionsEl.querySelectorAll('.suggestion-item');
    items.forEach(el => el.classList.remove('selected'));
    if (index >= 0 && index < items.length) {
      items[index].classList.add('selected');
      selectedSuggestion = index;
    }
  }

  function pickSuggestion(index) {
    if (index >= 0 && index < currentSuggestions.length) {
      searchInput.value = currentSuggestions[index].text;
      hideSuggestions();
      performSearch(currentSuggestions[index].text);
    }
  }

  // ===== Event Listeners =====
  searchInput.addEventListener('input', (e) => showSuggestions(e.target.value));

  searchInput.addEventListener('keydown', (e) => {
    if (!suggestionsEl.classList.contains('visible')) {
      if (e.key === 'Enter') performSearch(searchInput.value);
      return;
    }

    if (e.key === 'ArrowDown') {
      e.preventDefault();
      selectSuggestion(Math.min(selectedSuggestion + 1, currentSuggestions.length - 1));
    } else if (e.key === 'ArrowUp') {
      e.preventDefault();
      selectSuggestion(Math.max(selectedSuggestion - 1, -1));
    } else if (e.key === 'Enter') {
      e.preventDefault();
      if (selectedSuggestion >= 0) {
        pickSuggestion(selectedSuggestion);
      } else {
        hideSuggestions();
        performSearch(searchInput.value);
      }
    } else if (e.key === 'Escape') {
      hideSuggestions();
    }
  });

  searchBtn.addEventListener('click', () => performSearch(searchInput.value));

  document.addEventListener('click', (e) => {
    if (!e.target.closest('.search-wrapper')) hideSuggestions();
  });

  // ===== Voice Search =====
  let isListening = false;

  voiceBtn.addEventListener('click', () => {
    if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
      alert('您的浏览器不支持语音搜索功能');
      return;
    }

    if (isListening) {
      stopListening();
      return;
    }

    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    const recognition = new SpeechRecognition();
    recognition.lang = 'zh-CN';
    recognition.interimResults = true;

    recognition.onstart = () => {
      isListening = true;
      voiceBtn.classList.add('listening');
      searchInput.placeholder = '正在聆听...';
    };

    recognition.onresult = (event) => {
      const transcript = Array.from(event.results)
        .map(r => r[0].transcript)
        .join('');
      searchInput.value = transcript;
    };

    recognition.onend = () => stopListening();
    recognition.onerror = () => stopListening();

    recognition.start();
  });

  function stopListening() {
    isListening = false;
    voiceBtn.classList.remove('listening');
    searchInput.placeholder = '搜索任何内容...';
    if (searchInput.value.trim()) {
      performSearch(searchInput.value);
    }
  }

  // ===== Keyboard Shortcut =====
  document.addEventListener('keydown', (e) => {
    if (e.key === '/' && document.activeElement !== searchInput) {
      e.preventDefault();
      searchInput.focus();
    }
  });
</script>
